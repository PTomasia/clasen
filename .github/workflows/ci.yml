name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    # DB em memória para o CI: db/index.ts conecta no import (singleton). Os unit
    # tests usam better-sqlite3 :memory: próprio, e as páginas são force-dynamic
    # (não consultam o DB no build) — então basta a conexão não falhar. Sem isso,
    # cai no default file:./database/dev.db e o dir nem existe no runner.
    env:
      TURSO_DATABASE_URL: ":memory:"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npx vitest run

      - name: Build
        run: npm run build
